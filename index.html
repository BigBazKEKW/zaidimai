<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Žaidimai</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      background-color: #181818;   /* ultra dark grey */
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 2×2 grid */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
      width: 90%;
      max-width: 500px;
    }

    .game-card {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      aspect-ratio: 1 / 1;
      background-color: #222;
      color: #ddd;
      text-decoration: none;
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      border-radius: 16px;
      border: 1px solid #3a3a3a;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
      padding: 1rem;
    }

    .game-card:hover {
      background-color: #2a2a2a;
      border-color: #555;
      transform: scale(1.02);
    }
  </style>
</head>
<body>
  <div class="games-grid">
    <a href="/dienos-zodis" class="game-card">Dienos žodis</a>
    <a href="/dienos-daina" class="game-card">Dienos daina</a>
    <a href="/panasumas" class="game-card">Panašumas</a>
    <a href="/daugiau-maziau" class="game-card">Daugiau / mažiau</a>
  </div>
</body>
</html>
